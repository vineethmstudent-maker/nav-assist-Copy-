name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Check Flutter version
        run: flutter --version

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze code (warnings only, don't fail build)
        run: flutter analyze --no-fatal-infos || true

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nav-assist-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Print APK size
        run: |
          APK_SIZE=$(du -sh build/app/outputs/flutter-apk/app-release.apk | cut -f1)
          echo "APK size: $APK_SIZE"
          echo "✅ Build complete! Download the APK from the Artifacts section above."
